<div class="ai-layout">
  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-header">
      <div class="sidebar-logo">
     
      
      </div>
      <button class="collapse-btn" (click)="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <button class="new-chat-btn" (click)="startNewChat()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span *ngIf="!sidebarCollapsed">New Chat</span>
    </button>

    <div class="history-section" *ngIf="!sidebarCollapsed">
      <p class="history-label">Recent</p>
      <div class="history-list">
        <div
          *ngFor="let chat of chatHistory"
          class="history-item"
          [class.active]="chat.id === activeChatId"
          (click)="loadChat(chat.id)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>{{ chat.title }}</span>
        </div>
        <div *ngIf="chatHistory.length === 0" class="history-empty">
          No conversations yet
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Chat Area -->
  <main class="chat-main">
    <!-- Empty state / Welcome -->
    <div class="welcome-screen" *ngIf="messages.length === 0">
     
      <h1 class="welcome-title">AgroLink AI</h1>
      <p class="welcome-subtitle">Your intelligent farming assistant. Ask about crops, soil health, weather, pests, and more.</p>

      <div class="suggestion-chips">
        <button class="chip" (click)="sendSuggestion('What crops are best suited for high nitrogen soil?')">
           Best crops for high nitrogen soil
        </button>
        <button class="chip" (click)="sendSuggestion('How do I identify common wheat diseases?')">
          Identify wheat diseases
        </button>
        <button class="chip" (click)="sendSuggestion('What is the ideal pH level for tomato farming?')">
           Ideal pH for tomatoes
        </button>
        <button class="chip" (click)="sendSuggestion('How to improve soil potassium levels naturally?')">
           Improve soil potassium naturally
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-container" #messagesContainer *ngIf="messages.length > 0">
      <div *ngFor="let msg of messages" class="message-wrapper" [class.user-wrapper]="msg.role === 'user'">
        <div class="message" [class.user-message]="msg.role === 'user'" [class.ai-message]="msg.role === 'ai'">
          <div class="message-avatar" *ngIf="msg.role === 'ai'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-8v4h4l-5 8z" fill="white"/>
            </svg>
          </div>
          <div class="message-content">
            <p>{{ msg.content }}</p>
          </div>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="message-wrapper" *ngIf="isLoading">
        <div class="message ai-message">
          <div class="message-avatar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-8v4h4l-5 8z" fill="white"/>
            </svg>
          </div>
          <div class="message-content typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          #inputField
          [(ngModel)]="userInput"
          (keydown)="handleKeyDown($event)"
          placeholder="Ask AgroLink AI about crops, soil, weather, diseases..."
          rows="1"
          class="chat-input"
          [disabled]="isLoading">
        </textarea>
        <button
          class="send-btn"
          (click)="sendMessage()"
          [disabled]="!userInput.trim() || isLoading">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-disclaimer">AgroLink AI can make mistakes. Verify important farming decisions with local experts.</p>
    </div>
  </main>
</div>
