<!-- Delete confirmation modal -->
@if(showDeleteConfirm) {
  <div class="modal-backdrop">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-icon-danger">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="17" y1="11" x2="23" y2="11"/>
          </svg>
        </div>
        <h3>Remove User</h3>
      </div>
      <p class="modal-body-text">
        Are you sure you want to remove this user? All their data may be affected.
      </p>
      <div class="modal-actions">
        <button class="btn-ghost" (click)="cancelDelete()" [disabled]="isDeleting">Cancel</button>
        <button class="btn-danger" (click)="confirmDelete()" [disabled]="isDeleting">
          {{ isDeleting ? 'Removing...' : 'Remove User' }}
        </button>
      </div>
    </div>
  </div>
}

<!-- Page Content -->
<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h2 class="page-title">Manage Users</h2>
      <p class="page-subtitle">View and remove registered users</p>
    </div>
    <div class="header-badge">{{ users.length }} users</div>
  </div>

  <div *ngIf="loading" class="loading-state">
    <div class="mini-spinner"></div>
    Loading users...
  </div>
  <div *ngIf="error && !loading" class="error-state">{{ error }}</div>

  <div *ngIf="!loading && !error" class="table-card">
    <table class="table">
      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Type</th>
          <th class="th-action"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td class="td-name">{{ user.username }}</td>
          <td class="td-email">{{ user.email }}</td>
          <td><span class="type-badge">{{ user.userType }}</span></td>
          <td class="td-action">
            <button class="btn-remove" (click)="openDeleteConfirm(user.id)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6"/><path d="M14 11v6"/>
                <path d="M9 6V4h6v2"/>
              </svg>
              Remove
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
