<div class="signup-page">
  <div class="signup-card">

    <!-- HEADER -->
    <div class="card-header">
      <div class="display:flex">
        <svg width="24" height="24" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(340,340)">
            <ellipse cx="0" cy="-155" rx="52" ry="95" fill="#3ec73e"/>
            <ellipse cx="0" cy="-155" rx="52" ry="95" fill="#3ec73e" transform="rotate(45)"/>
            <ellipse cx="0" cy="-155" rx="52" ry="95" fill="#3ec73e" transform="rotate(90)"/>
            <ellipse cx="0" cy="-155" rx="52" ry="95" fill="#3ec73e" transform="rotate(135)"/>
            <ellipse cx="0" cy="-155" rx="52" ry="95" fill="#3ec73e" transform="rotate(180)"/>
            <ellipse cx="0" cy="-155" rx="52" ry="95" fill="#3ec73e" transform="rotate(225)"/>
            <ellipse cx="0" cy="-155" rx="52" ry="95" fill="#3ec73e" transform="rotate(270)"/>
            <ellipse cx="0" cy="-155" rx="52" ry="95" fill="#3ec73e" transform="rotate(315)"/>
            <circle cx="0" cy="0" r="72" fill="#FFD700"/>
            <circle cx="0" cy="0" r="56" fill="#FFC000"/>
          </g>
        </svg>
          <span style="font-size:larger;">Agrolink</span>

      </div>
      
      <h1 class="heading">Create Account</h1>
     
    </div>

    <!-- FORM -->
    <form [formGroup]="signupForm" class="signup-form" (ngSubmit)="register()">

      <div class="form-grid">

        <!-- Username -->
        <div class="field-group">
          <label class="field-label">Username</label>
          <div class="input-wrapper" [class.error-border]="getUsernameError()">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input type="text" placeholder="Enter your username" formControlName="Username" />
          </div>
          <p class="error-msg" *ngIf="getUsernameError()">{{ getUsernameError() }}</p>
        </div>

        <!-- Email -->
        <div class="field-group">
          <label class="field-label">Email</label>
          <div class="input-wrapper" [class.error-border]="getEmailError()">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
            <input type="email" placeholder="Enter your email" formControlName="Email" />
          </div>
          <p class="error-msg" *ngIf="getEmailError()">{{ getEmailError() }}</p>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label">Password</label>
          <div class="input-wrapper" [class.error-border]="getPasswordError()">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" placeholder="Enter your password"
              formControlName="Password" />
            <button type="button" class="eye-btn" (click)="togglePasswordVisibility()">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                <line x1="2" x2="22" y1="2" y2="22" />
              </svg>
            </button>
          </div>
          <p class="error-msg" *ngIf="getPasswordError()">{{ getPasswordError() }}</p>
        </div>

        <!-- Confirm Password -->
        <div class="field-group">
          <label class="field-label">Confirm Password</label>
          <div class="input-wrapper" [class.error-border]="getConfirmPasswordError()">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Re-enter your password"
              formControlName="SecondPassword" />
            <button type="button" class="eye-btn" (click)="toggleConfirmPasswordVisibility()">
              <svg *ngIf="!showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg *ngIf="showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                <line x1="2" x2="22" y1="2" y2="22" />
              </svg>
            </button>
          </div>
          <p class="error-msg" *ngIf="getConfirmPasswordError()">{{ getConfirmPasswordError() }}</p>
        </div>

      

      </div>

      <!-- Hidden UserType -->
      <input type="hidden" formControlName="UserType" />

      <button class="signup-btn" type="submit" [disabled]="signupForm.invalid">
        Create Account
      </button>

    </form>

    <p class="login-text">
      Already have an account?
      <a routerLink="/login" class="login-link">Log in</a>
    </p>

  </div>
</div>
