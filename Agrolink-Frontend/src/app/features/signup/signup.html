<div class="signup-page">
  <!-- LEFT -->
  <div class="signup-left">
    <h1 class="title">Create Account</h1>
    <div class="divider"></div>

    <form [formGroup]="signupForm" class="signup-form" (ngSubmit)="register()">
      
      <!-- Username -->
      <label>Username:</label>
      <input type="text" placeholder="example....." formControlName="Username" />
      <p class="error">
        {{ getUsernameError() }}
      </p>

      <!-- Email -->
      <label>Email:</label>
      <input type="email" placeholder="example@email.com" formControlName="Email" />
      <p class="error">
        {{ getEmailError() }}
      </p>

      <!-- Password -->
      <label>Password:</label>
      <input type="password" placeholder="********" formControlName="Password" />
      <p class="error">
        {{ getPasswordError() }}
      </p>

      <!-- Confirm Password -->
      <label>Confirm Password:</label>
      <input type="password" placeholder="********" formControlName="SecondPassword" />
      <p class="error">
        {{ getConfirmPasswordError() }}
      </p>

      <!-- Hidden UserType -->
      <input type="hidden" formControlName="UserType" />

      <button class="signup-btn" type="submit" [disabled]="signupForm.invalid">Sign Up</button>
    </form>

    <p class="login-text">
      Already have an account?
      <span class="login-link"><a routerLink="/login">Log in</a></span>
    </p>
  </div>

  <!-- RIGHT -->
  <div class="signup-right"></div>
</div>
